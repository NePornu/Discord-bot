<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení — Tréninkové Centrum</title>
    <style>
        :root {
            --primary: #0088cc;
            --bg: #1d1f20;
            --text: #ffffff;
            --discord: #5865F2;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: #2a2c2e;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }

        .logo-icon {
            font-size: 50px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--discord);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 700;
            transition: 0.2s;
        }

        .discord-btn:hover {
            background: #4752c4;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo-icon">🎓</div>
        <h1>Vítejte v Tréninkovém Centru</h1>
        <p>Pro přístup ke kurzům a simulacím se prosím přihlaste svým Discord účtem.</p>

</html>
