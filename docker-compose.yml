services:
  redis:
    image: redis:alpine
    container_name: discord-redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - botnet
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  discord-bot-go:
    build:
      context: .
      dockerfile: services/core/Dockerfile
    container_name: discord-bot-go
    restart: always
    depends_on:
      - redis
    environment:
      - TZ=Europe/Prague
      - BOT_TOKEN=${BOT_TOKEN}
      - REDIS_URL=redis://redis:6379/0
      - CONSOLE_CHANNEL_ID=${CONSOLE_CHANNEL_ID}
      - VERIFICATION_CHANNEL_ID=${VERIFICATION_CHANNEL_ID}
      - VERIFICATION_LOG_CHANNEL_ID=${VERIFICATION_LOG_CHANNEL_ID}
      - WELCOME_CHANNEL_ID=${WELCOME_CHANNEL_ID}
      - VERIFIED_ROLE_ID=${VERIFIED_ROLE_ID}
    volumes:
      - ./services/core/data:/root/data
    networks:
      - botnet
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  metricord-dashboard:
    build: .
    container_name: web-dashboard
    restart: always
    depends_on:
      - redis
    command: [ "uvicorn", "services.dashboard.backend.dashboard:app", "--host", "0.0.0.0", "--port", "8092" ]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DASHBOARD_SECRET_KEY=${DASHBOARD_SECRET_KEY}
      - DASHBOARD_ACCESS_TOKEN=${DASHBOARD_ACCESS_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_REDIRECT_URI=http://207.180.223.191:8092/auth/callback
      - BOT_TOKEN=${BOT_TOKEN}
      - SESSION_COOKIE_NAME=metricord_session
      - TZ=Europe/Prague
    ports:
      - "8092:8092"
    volumes:
      - .:/app
    networks:
      - botnet
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  monitor:
    build: .
    container_name: discord-monitor
    restart: always
    depends_on:
      - redis
    command: [ "python", "-u", "scripts/monitor.py" ]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - BOT_TOKEN=${BOT_TOKEN}
      - ALERT_CHANNEL_ID=1468607459332456518
      - TZ=Europe/Prague
    volumes:
      - .:/app
    networks:
      - botnet
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M

networks:
  botnet:
    external: true
  fluxer_default:
    external: true
  sso-net:
    external: true

volumes:
  redis_data:
